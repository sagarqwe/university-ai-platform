# File: ai-service/pytest.ini
# Purpose: Configures pytest for the AI service test suite.
# Run tests with: pytest (from ai-service directory)

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra info
addopts = -v --tb=short

# Suppress noisy deprecation warnings from sentence-transformers / numpy
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Env vars for test run (no real API keys needed for unit tests)
env =
    LLM_PROVIDER=gemini
    GEMINI_API_KEY=test-key
    OPENAI_API_KEY=test-key
    EMBEDDING_MODEL=all-MiniLM-L6-v2
