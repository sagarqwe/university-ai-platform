# File: frontend/nginx.conf
# Purpose: Nginx config for serving the React SPA inside Docker.
#
# Two responsibilities:
#   1. SPA routing — all unknown paths return index.html (React Router handles them)
#   2. Proxy /api/* → Spring Boot backend container (avoids CORS from browser)

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /api/* to Spring Boot backend ────────────────────────────────
    # In Docker Compose, the backend service is named "backend"
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            return 204;
        }
    }

    # ── Static asset caching ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
