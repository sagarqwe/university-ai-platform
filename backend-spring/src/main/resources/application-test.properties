# File: backend-spring/src/main/resources/application-test.properties
# Purpose: H2 in-memory DB config for running tests without PostgreSQL.
# Activate with: -Dspring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-key-for-testing-only-32-chars-min
app.jwt.expiration-ms=3600000
app.ai.service.url=http://localhost:8000
app.upload.dir=./test-uploads
app.cors.allowed-origins=http://localhost:3000
