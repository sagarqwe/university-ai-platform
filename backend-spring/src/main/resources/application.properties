# ─────────────────────────────────────────────────────────────────────────────
# File: backend-spring/src/main/resources/application.properties
# Purpose: All Spring Boot configuration — DB, JWT, file upload, AI service URL
# ─────────────────────────────────────────────────────────────────────────────

# Server
server.port=8080

# ─────────────── PostgreSQL ───────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/university_ai_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─────────────── File Upload ───────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# PDF storage directory (Spring Boot saves here, AI service reads from its own path)
app.upload.dir=./uploads/pdfs

# ─────────────── JWT ───────────────
# IMPORTANT: Change this secret in production! Use at least 256-bit key.
app.jwt.secret=university-ai-platform-super-secret-jwt-key-change-in-production-2024
app.jwt.expiration-ms=86400000

# ─────────────── AI Service ───────────────
app.ai.service.url=http://localhost:8000

# ─────────────── CORS ───────────────
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# ─────────────── Logging ───────────────
logging.level.com.university.platform=INFO
logging.level.org.springframework.security=WARN

# AI service PDF data directory (for localhost file sync)
app.ai.data.dir=../ai-service/data/pdfs

# ─────────────── Actuator (Docker healthcheck) ───────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.security.enabled=false
